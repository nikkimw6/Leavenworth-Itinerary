<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Leavenworth Meetup Itinerary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #fff;
  color: #111;
  font-size: 14px;
}

.wrap {
  padding: 1rem;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 8px;
}

.title {
  font-size: 18px;
  font-weight: 500;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  background: #f5f5f5;
  border: 1px solid #ddd;
  color: #555;
}

.btn:hover {
  background: #ebebeb;
}

.grid-wrap {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
}

.hrow {
  display: grid;
  grid-template-columns: 72px repeat(5, minmax(0, 1fr));
  background: #f9f9f9;
  border-bottom: 1px solid #e0e0e0;
}

.hcell {
  padding: 8px 6px;
  font-size: 12px;
  font-weight: 500;
  color: #666;
  text-align: center;
  border-right: 1px solid #ebebeb;
}

.hcell:last-child {
  border-right: none;
}

.trow {
  display: grid;
  grid-template-columns: 72px repeat(5, minmax(0, 1fr));
  border-bottom: 1px solid #ebebeb;
}

.trow:last-child {
  border-bottom: none;
}

.trow:nth-child(even) {
  background: #fafafa;
}

.trow.hour-div {
  border-top: 1px solid #e0e0e0;
}

.tlabel {
  padding: 0 8px;
  font-size: 11px;
  color: #aaa;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  border-right: 1px solid #e0e0e0;
  min-height: 36px;
  white-space: nowrap;
}

.trow.hour-div .tlabel {
  font-weight: 500;
  color: #666;
  font-size: 12px;
}

.cell {
  border-right: 1px solid #ebebeb;
  min-height: 36px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
}

.cell:last-child {
  border-right: none;
}

.cell:focus-within {
  background: #eff6ff;
}

.cell-ta {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 12px;
  color: #111;
  font-family: inherit;
  padding: 4px 24px 4px 6px;
  min-height: 36px;
  resize: none;
  overflow: hidden;
  line-height: 1.4;
}

.cell-ta::placeholder {
  color: #ccc;
}

.pin-btn {
  position: absolute;
  right: 3px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #bbb;
  font-size: 14px;
  padding: 2px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.1s;
}

.cell:hover .pin-btn {
  opacity: 1;
}

.pin-btn.has-addr {
  opacity: 1;
  color: #3b82f6;
}

.addr-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: #1d4ed8;
  background: #dbeafe;
  border-radius: 4px;
  padding: 1px 5px;
  margin: 0 4px 3px 4px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  max-width: 100%;
}


  font-size: 12px;
  color: #aaa;
  margin-top: 10px;
  text-align: right;
}

.panel-container {
  position: relative;
}

.panel-backdrop {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 10;
}

.panel-backdrop.open {
  display: block;
}

.panel-anchor {
  position: absolute;
  z-index: 20;
}

.panel {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 1rem;
  width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.panel-title {
  font-size: 13px;
  font-weight: 500;
}

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #aaa;
  font-size: 18px;
  display: flex;
  align-items: center;
}

.close-btn:hover {
  color: #333;
}

.panel label {
  font-size: 11px;
  color: #888;
  display: block;
  margin-bottom: 4px;
  margin-top: 10px;
}

.panel input[type=text],
.panel textarea {
  width: 100%;
  font-size: 12px;
  font-family: inherit;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 6px 8px;
  outline: none;
  color: #111;
}

.panel input[type=text]:focus,
.panel textarea:focus {
  border-color: #93c5fd;
  box-shadow: 0 0 0 2px #dbeafe;
}

.panel textarea {
  resize: vertical;
  min-height: 56px;
}

.panel-footer {
  margin-top: 12px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 8px;
  cursor: pointer;
  background: #dbeafe;
  border: 1px solid #93c5fd;
  color: #1d4ed8;
}

.save-btn:hover {
  background: #bfdbfe;
}

  </style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <span class="title">2026 Leavenworth Meetup Itinerary</span>
      <p style="font-size: 13px; color: #888; margin-top: 4px;">Hover over any cell and click the pin to view address or details</p>
    </div>
    <button class="btn" onclick="copySchedule()">
      <i class="ti ti-copy"></i> Copy as Markdown
    </button>
  </div>

  <div class="panel-container">
    <div class="grid-wrap" id="schedule-grid"></div>

    <div class="panel-backdrop" id="backdrop">
      <div class="panel-anchor" id="panel-anchor">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title" id="panel-title"></div>
            <div style="display:flex; gap:6px; align-items:center;">
              <button class="btn" id="edit-toggle-btn" onclick="toggleEdit()" style="padding:4px 10px; font-size:11px;"><i class="ti ti-edit" style="font-size:12px"></i> Edit</button>
              <button class="close-btn" onclick="closePanel()"><i class="ti ti-x"></i></button>
            </div>
          </div>

          <div id="view-mode">
            <div id="view-label" style="font-size:13px; font-weight:500; color:#111; margin-bottom:4px; display:none;"></div>
            <div id="view-addr" style="font-size:12px; color:#444; margin-bottom:4px; display:none;"></div>
            <div id="view-notes" style="font-size:12px; color:#888; display:none;"></div>
            <div id="view-empty" style="font-size:12px; color:#bbb;">No details yet — click Edit to add.</div>
          </div>

          <div id="edit-mode" style="display:none;">
            <label>Event / label</label>
            <input type="text" id="addr-label" placeholder="e.g. Doctor appointment" />
            <label>Address</label>
            <textarea id="addr-addr" placeholder="123 Main St, Portland, OR"></textarea>
            <label>Notes</label>
            <input type="text" id="addr-notes" placeholder="Parking, floor, etc." />
            <label>Highlight color</label>
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:4px;">
              <div style="display:flex; align-items:center; gap:6px;">
                <input type="color" id="addr-color" value="#dbeafe" style="width:32px; height:32px; border:1px solid #ddd; border-radius:6px; padding:2px; cursor:pointer;" />
                <span style="font-size:11px; color:#888;">Badge</span>
              </div>
              <div style="display:flex; align-items:center; gap:6px;">
                <input type="color" id="cell-color" value="#ffffff" style="width:32px; height:32px; border:1px solid #ddd; border-radius:6px; padding:2px; cursor:pointer;" />
                <span style="font-size:11px; color:#888;">Cell</span>
              </div>
              <div style="display:flex; align-items:center; gap:6px;">
                <input type="color" id="font-color" value="#111111" style="width:32px; height:32px; border:1px solid #ddd; border-radius:6px; padding:2px; cursor:pointer;" />
                <span style="font-size:11px; color:#888;">Font</span>
              </div>
            </div>
            <div class="panel-footer">
              <button class="btn" id="panel-copy-btn" onclick="copyPin(activeCell && activeCell.ck)" style="padding:6px 10px; min-width:32px;" title="Copy pin details only">C</button>
              <button class="btn" id="panel-paste-btn" onclick="pastePin()" style="padding:6px 10px; min-width:32px;" title="Paste copied pin details">P</button>
              <button class="btn" id="panel-cc-btn" onclick="copyCell(activeCell && activeCell.ck)" style="padding:6px 10px; min-width:36px;" title="Copy entire cell">CC</button>
              <button class="btn" onclick="clearAddr()">Clear</button>
              <button class="save-btn" onclick="saveAddr()"><i class="ti ti-check"></i> Save</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    <i class="ti ti-map-pin"></i> Hover over any cell and click the pin to view address or details
  </div>
</div>

<script>
const days = ["Mon 7/6", "Tue 7/7", "Wed 7/8", "Thu 7/9", "Fri 7/10"];

const times = [];
for (let h = 8; h < 21; h++) {
  const ampm = h < 12 ? "AM" : "PM";
  const disp = h === 12 ? 12 : h % 12;
  times.push({ key: h + ":0", label: disp + ":00 " + ampm, isHour: true });
  times.push({ key: h + ":30", label: disp + ":30 " + ampm, isHour: false });
}

const cellData = {};
let activeCell = null;
let copiedPin = null;
let copiedCell = null;

const grid = document.getElementById("schedule-grid");

// Header row
const hrow = document.createElement("div");
hrow.className = "hrow";
hrow.innerHTML =
  '<div class="hcell"></div>' +
  days.map((d) => `<div class="hcell">${d}</div>`).join("");
grid.appendChild(hrow);

// Time rows
times.forEach((t) => {
  const row = document.createElement("div");
  row.className = "trow" + (t.isHour ? " hour-div" : "");

  const lbl = document.createElement("div");
  lbl.className = "tlabel";
  lbl.textContent = t.label;
  row.appendChild(lbl);

  days.forEach((day) => {
    const ck = t.key + "|" + day;
    cellData[ck] = { text: "", addrLabel: "", addr: "", notes: "", color: "#dbeafe", cellColor: "#ffffff", fontColor: "#111111" };

    const cell = document.createElement("div");
    cell.className = "cell";

    const ta = document.createElement("textarea");
    ta.className = "cell-ta";
    ta.rows = 1;
    ta.addEventListener("input", function () {
      cellData[ck].text = this.value;
      this.style.height = "auto";
      this.style.height = Math.max(36, this.scrollHeight) + "px";
    });

    const pin = document.createElement("button");
    pin.className = "pin-btn";
    pin.innerHTML = '<i class="ti ti-map-pin"></i>';
    pin.title = "Add address";
    pin.addEventListener("click", (e) => {
      e.stopPropagation();
      openPanel(ck, t.label, day, pin);
    });

    const badge = document.createElement("div");
    badge.className = "addr-badge";
    badge.id = "badge-" + ck;
    badge.style.display = "none";
    badge.addEventListener("click", () => openPanel(ck, t.label, day, pin));

    cell.appendChild(ta);
    cell.appendChild(pin);
    cell.appendChild(badge);
    row.appendChild(cell);
  });

  grid.appendChild(row);
});

// Panel logic
function openPanel(ck, timeLabel, day, pinEl) {
  activeCell = { ck, pinEl, timeLabel, day };
  const d = cellData[ck];
  document.getElementById("panel-title").textContent = day + " · " + timeLabel;

  document.getElementById("addr-label").value = d.addrLabel || "";
  document.getElementById("addr-addr").value = d.addr || "";
  document.getElementById("addr-notes").value = d.notes || "";
  document.getElementById("addr-color").value = d.color || "#dbeafe";
  document.getElementById("cell-color").value = d.cellColor || "#ffffff";
  document.getElementById("font-color").value = d.fontColor || "#111111";

  const hasData = d.addrLabel || d.addr || d.notes;
  document.getElementById("view-label").textContent = d.addrLabel || "";
  document.getElementById("view-label").style.display = d.addrLabel ? "block" : "none";
  document.getElementById("view-addr").textContent = d.addr || "";
  document.getElementById("view-addr").style.display = d.addr ? "block" : "none";
  document.getElementById("view-notes").textContent = d.notes || "";
  document.getElementById("view-notes").style.display = d.notes ? "block" : "none";
  document.getElementById("view-empty").style.display = hasData ? "none" : "block";

  document.getElementById("view-mode").style.display = "block";
  document.getElementById("edit-mode").style.display = "none";
  document.getElementById("edit-toggle-btn").innerHTML = '<i class="ti ti-edit" style="font-size:12px"></i> Edit';

  const backdrop = document.getElementById("backdrop");
  backdrop.classList.add("open");

  const anchor = document.getElementById("panel-anchor");
  const pinRect = pinEl.getBoundingClientRect();
  const wrapRect = document.querySelector(".panel-container").getBoundingClientRect();
  let top = pinRect.bottom - wrapRect.top + 4;
  let left = pinRect.left - wrapRect.left - 250;
  if (left < 0) left = pinRect.right - wrapRect.left + 4;
  anchor.style.top = top + "px";
  anchor.style.left = Math.max(0, left) + "px";
}

function toggleEdit() {
  const editMode = document.getElementById("edit-mode");
  const viewMode = document.getElementById("view-mode");
  const btn = document.getElementById("edit-toggle-btn");
  if (editMode.style.display === "none") {
    editMode.style.display = "block";
    viewMode.style.display = "none";
    btn.innerHTML = '<i class="ti ti-eye" style="font-size:12px"></i> View';
    setTimeout(() => document.getElementById("addr-label").focus(), 50);
  } else {
    editMode.style.display = "none";
    viewMode.style.display = "block";
    btn.innerHTML = '<i class="ti ti-edit" style="font-size:12px"></i> Edit';
  }
}

function copyPin(ck) {
  const d = cellData[ck];
  copiedPin = { addrLabel: d.addrLabel, addr: d.addr, notes: d.notes, color: d.color, cellColor: d.cellColor, fontColor: d.fontColor };
  const btn = document.getElementById("panel-copy-btn");
  btn.textContent = "✓";
  setTimeout(() => { btn.textContent = "C"; }, 1500);
}

function copyCell(ck) {
  const d = cellData[ck];
  copiedCell = { text: d.text, addrLabel: d.addrLabel, addr: d.addr, notes: d.notes, color: d.color, cellColor: d.cellColor, fontColor: d.fontColor };
  const btn = document.getElementById("panel-cc-btn");
  btn.textContent = "✓";
  setTimeout(() => { btn.textContent = "CC"; }, 1500);
}

function pastePin() {
  const src = copiedCell || copiedPin;
  if (!src || !activeCell) return;
  const { ck, pinEl } = activeCell;
  document.getElementById("addr-label").value = src.addrLabel || "";
  document.getElementById("addr-addr").value = src.addr || "";
  document.getElementById("addr-notes").value = src.notes || "";
  document.getElementById("addr-color").value = src.color || "#dbeafe";
  document.getElementById("cell-color").value = src.cellColor || "#ffffff";
  document.getElementById("font-color").value = src.fontColor || "#111111";
  if (copiedCell && src.text !== undefined) {
    cellData[ck].text = src.text;
    const ta = pinEl.closest(".cell").querySelector(".cell-ta");
    ta.value = src.text;
    ta.style.height = "auto";
    ta.style.height = Math.max(36, ta.scrollHeight) + "px";
  }
  const btn = document.getElementById("panel-paste-btn");
  btn.textContent = "✓";
  setTimeout(() => { btn.textContent = "P"; }, 1500);
}

function closePanel() {
  document.getElementById("backdrop").classList.remove("open");
  activeCell = null;
}

function saveAddr() {
  if (!activeCell) return;
  const { ck, pinEl, timeLabel, day } = activeCell;
  const lbl = document.getElementById("addr-label").value.trim();
  const addr = document.getElementById("addr-addr").value.trim();
  const notes = document.getElementById("addr-notes").value.trim();
  const color = document.getElementById("addr-color").value;
  const cellColor = document.getElementById("cell-color").value;
  const fontColor = document.getElementById("font-color").value;
  cellData[ck].addrLabel = lbl;
  cellData[ck].addr = addr;
  cellData[ck].notes = notes;
  cellData[ck].color = color;
  cellData[ck].cellColor = cellColor;
  cellData[ck].fontColor = fontColor;

  const cellEl = pinEl.closest(".cell");
  cellEl.style.background = cellColor !== "#ffffff" ? cellColor : "";
  const ta = cellEl.querySelector(".cell-ta");
  ta.style.color = fontColor;

  const badge = document.getElementById("badge-" + ck);
  if (addr || lbl) {
    badge.innerHTML = '<i class="ti ti-map-pin" style="font-size:10px"></i> ' + (lbl || addr).substring(0, 22);
    badge.style.display = "flex";
    badge.style.background = color;
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const brightness = (r*299 + g*587 + b*114) / 1000;
    badge.style.color = brightness > 128 ? "#1a1a1a" : "#ffffff";
    pinEl.classList.add("has-addr");
    pinEl.style.color = brightness > 128 ? color : color;
  } else {
    badge.style.display = "none";
    pinEl.classList.remove("has-addr");
  }
  closePanel();
  openPanel(ck, timeLabel, day, pinEl);
  document.getElementById("backdrop").classList.add("open");
}

function clearAddr() {
  document.getElementById("addr-label").value = "";
  document.getElementById("addr-addr").value = "";
  document.getElementById("addr-notes").value = "";
}

document.getElementById("backdrop").addEventListener("click", function (e) {
  if (e.target === this) closePanel();
});

function copySchedule() {
  const cols = ["Time", ...days];
  let md = "| " + cols.join(" | ") + " |\n";
  md += "| " + cols.map(() => "---").join(" | ") + " |\n";
  times.forEach((t) => {
    const row = [
      t.label,
      ...days.map((d) => {
        const ck = t.key + "|" + d;
        const cd = cellData[ck];
        let cell = (cd.text || "").replace(/\n/g, " ");
        if (cd.addr) cell += (cell ? " — " : "") + cd.addr;
        return cell;
      }),
    ];
    md += "| " + row.join(" | ") + " |\n";
  });

  navigator.clipboard.writeText(md).then(() => {
    const btn = document.querySelector(".top-bar .btn");
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy"></i> Copy as Markdown';
    }, 2000);
  });
}


</script>
</body>
</html>
